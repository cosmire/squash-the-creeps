name: verify

# Runs on every change, and weekly with nobody touching anything — a template
# can break because the world moved, not because the code did.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily. Actions minutes are free for public repos, and the canary tracks
    # a moving target — a daily run means one day of upstream commits to diff
    # when it breaks, not seven. It also keeps the user-facing "verified"
    # timestamp fresh.
    - cron: "0 4 * * *"   # 04:00 UTC daily
  workflow_dispatch:

env:
  GODOT_PIN: "4.5.2"
  GODOT_CANARY: "4.7.1"

# GITHUB_TOKEN is read-only by default; these jobs write status back and
# open issues, so the grants have to be explicit.
permissions:
  contents: write
  issues: write

jobs:
  # ── STABLE: the exact combination a developer gets. Must stay green. ──
  stable:
    name: stable (pinned)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust

      - name: Lockfile — generate on first run, then enforce
        working-directory: rust
        # A pinned rev alone is not reproducibility; the lockfile pins the
        # whole dependency graph. Bootstraps itself, then --locked keeps it
        # honest: the build fails if the lockfile would need to change.
        run: |
          if [ -f Cargo.lock ]; then
            cargo build --locked --verbose
          else
            echo "No Cargo.lock — generating one to be committed."
            cargo generate-lockfile
          fi

      - name: Build Rust library
        working-directory: rust
        run: cargo build --verbose

      - name: Run Rust unit tests
        working-directory: rust
        run: cargo test --verbose

      - name: Install Godot ${{ env.GODOT_PIN }} (headless)
        run: |
          URL="https://github.com/godotengine/godot/releases/download/${{ env.GODOT_PIN }}-stable/Godot_v${{ env.GODOT_PIN }}-stable_linux.x86_64.zip"
          curl -sSL -o godot.zip "$URL"
          unzip -q godot.zip
          mv Godot_v${{ env.GODOT_PIN }}-stable_linux.x86_64 godot-bin
          chmod +x godot-bin

      - name: Import project and load the Rust library
        # Catches what the compiler cannot see: library built but Godot can't
        # load it, class name mismatch, scene referencing a missing node.
        run: ./godot-bin --headless --path godot --import

      - name: Write status
        run: |
          mkdir -p status
          cat > status/stable.json <<EOF
          {
            "template": "squash-the-creeps",
            "lane": "stable",
            "checked_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "versions": {
              "godot": "${{ env.GODOT_PIN }}",
              "rust": "1.94.0",
              "gdext": "410580d477fe150e12fd9649cf5ab12a800a1884"
            },
            "build": "pass",
            "tests": "pass",
            "import": "pass"
          }
          EOF

      - name: Publish status
        if: github.event_name != 'pull_request'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update stable status"
          file_pattern: status/*.json rust/Cargo.lock

  # ── CANARY: builds against latest. Allowed to fail; failure is early warning. ──
  canary:
    name: canary (latest)
    runs-on: ubuntu-latest
    # Allowed to fail without failing the run, but the outcome is published
    # explicitly — `continue-on-error` makes needs.<job>.result read as
    # 'success' downstream, which silently disabled the reporting job.
    continue-on-error: true
    outputs:
      broke: ${{ steps.verdict.outputs.broke }}
    steps:
      - uses: actions/checkout@v4

      - name: Unpin gdext and the toolchain
        working-directory: rust
        run: |
          sed -i 's/, rev = "[a-f0-9]*"//' Cargo.toml
          rm -f rust-toolchain.toml

      - uses: dtolnay/rust-toolchain@stable

      - name: Build against latest gdext
        id: build_latest
        continue-on-error: true
        working-directory: rust
        run: cargo build --verbose

      - name: Install Godot ${{ env.GODOT_CANARY }} (headless)
        run: |
          URL="https://github.com/godotengine/godot/releases/download/${{ env.GODOT_CANARY }}-stable/Godot_v${{ env.GODOT_CANARY }}-stable_linux.x86_64.zip"
          curl -sSL -o godot.zip "$URL"
          unzip -q godot.zip
          mv Godot_v${{ env.GODOT_CANARY }}-stable_linux.x86_64 godot-bin
          chmod +x godot-bin

      - name: Import on latest Godot
        id: import_latest
        continue-on-error: true
        run: ./godot-bin --headless --path godot --import

      - name: Record canary verdict
        id: verdict
        if: always()
        run: |
          if [ "${{ steps.build_latest.outcome }}" = "failure" ] || \
             [ "${{ steps.import_latest.outcome }}" = "failure" ]; then
            echo "broke=true" >> "$GITHUB_OUTPUT"
          else
            echo "broke=false" >> "$GITHUB_OUTPUT"
          fi

  # A red canary is a signal, not an outage — it means migration work is coming.
  report-canary:
    needs: canary
    if: always() && needs.canary.outputs.broke == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Open a migration issue
        run: |
          gh issue list --label canary --state open --json number \
            | grep -q '"number"' || \
          gh issue create --label canary \
            --title "Canary failing: upcoming toolchain break" \
            --body "The canary lane failed. The pinned build is still green, so users are unaffected, but a future gdext/Godot upgrade will break this template. Investigate before bumping the pins."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Separate job: the delivery path is verified independently so a packaging
  # problem cannot block the build status from publishing.
  scaffold:
    name: scaffold (cargo-generate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Generate a project and check it matches a clone
        run: |
          cargo install cargo-generate --locked --quiet
          cd /tmp
          cargo generate --path "$GITHUB_WORKSPACE" --name cosmire-scaffold-test --silent
          for f in rust/Cargo.toml rust/rust-toolchain.toml godot/project.godot godot/rust.gdextension; do
            test -f "cosmire-scaffold-test/$f" || { echo "missing $f in generated project"; exit 1; }
          done
